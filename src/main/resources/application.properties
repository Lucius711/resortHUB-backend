spring.config.import=optional:file:.env[.properties]
spring.application.name=resortHUB

# Port chạy server
server.port=${SERVER_PORT:3000}

# Cấu hình kết nối cơ sở dữ liệu (ưu tiên .env / environment, có fallback local để boot được khi thiếu biến)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/resort_hub_data}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver


# Cấu hình JPA/Hibernate
spring.main.lazy-initialization=true
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Cấu hình JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:604800000}

# Cấu hình Gmail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.default-encoding=UTF-8

# Cấu hình địa chỉ lưu ảnh
file.storage-dir=${FILE_STORAGE_DIR:uploads/}

# Stripe Checkout + webhook
app.payment.stripe.secret-key=${STRIPE_SECRET_KEY}
app.payment.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
app.payment.stripe.success-url=${STRIPE_SUCCESS_URL:https://your-frontend.example/payment/success}
app.payment.stripe.cancel-url=${STRIPE_CANCEL_URL:https://your-frontend.example/payment/cancel}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}
spring.data.redis.lettuce.pool.max-active=${REDIS_POOL_MAX_ACTIVE:64}
spring.data.redis.lettuce.pool.max-idle=${REDIS_POOL_MAX_IDLE:32}
spring.data.redis.lettuce.pool.min-idle=${REDIS_POOL_MIN_IDLE:8}
spring.data.redis.lettuce.pool.max-wait=${REDIS_POOL_MAX_WAIT:2s}

# Security rate limit
app.security.rate-limit.auth.limit=${AUTH_RATE_LIMIT:20}
app.security.rate-limit.auth.window-seconds=${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}

